<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>數列獵人｜學生端</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark" aria-hidden="true">S</div>
      <div>
        <p class="eyebrow">3-1 等差數列與等差級數</p>
        <h1>數列獵人｜任務介面</h1>
        <p class="subtitle">完成任務、累積 EXP、解鎖公差追蹤者徽章</p>
      </div>
    </div>
    <div class="status">
      <span id="studentBadge">尚未登入</span>
      <span id="expBadge">0 EXP</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel login-panel" id="loginPanel">
      <div class="section-title">
        <h2>選擇獵人身份</h2>
        <p>選定身份後開始任務；名單會依教師設定更新。</p>
      </div>
      <div class="student-grid" id="studentGrid"></div>
    </section>

    <section class="panel mission-panel">
      <div class="section-title">
        <h2>關卡地圖</h2>
        <p>依課本頁碼順序前進，完成後會累積 EXP。</p>
      </div>
      <div class="mission-filter">
        <label for="missionGroupSelect">選擇任務章節</label>
        <select id="missionGroupSelect"></select>
        <p id="missionGroupProgress">請先選擇獵人身份。</p>
      </div>
      <div class="mission-list" id="missionList"></div>
    </section>

    <section class="panel question-panel">
      <div class="question-head">
        <div>
          <p class="eyebrow" id="unitName">請先選擇任務</p>
          <h2 id="levelName">等待開始</h2>
        </div>
        <span class="difficulty" id="difficulty">-</span>
      </div>

      <div class="question-box">
        <div class="scroll-label">任務卷軸</div>
        <p id="questionText">請先選擇學生代號，再選擇左側任務。</p>
        <div class="choices" id="choices"></div>
        <input class="answer-input" id="answerInput" type="text" placeholder="在這裡輸入答案">
      </div>

      <div class="actions">
        <button id="hintButton" type="button">支援提示</button>
        <a class="ai-tutor-link" id="aiTutorLink" href="#" target="_blank" rel="noreferrer">蘇格拉底助教</a>
        <button id="submitButton" type="button">提交任務</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="hint-box" id="hintBox"></div>
    </section>
  </main>

  <script src="../config.js"></script>
  <script src="./questions.js"></script>
  <script src="./app.js"></script>
</body>
</html>
