<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>數列獵人｜教師教學端</title>
  <link rel="stylesheet" href="./teach.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark" aria-hidden="true">T</div>
      <div>
        <p class="eyebrow">3-1 等差數列與等差級數</p>
        <h1>數列獵人｜教師教學端</h1>
        <p class="subtitle">3-1 教學操作台</p>
      </div>
    </div>
    <nav class="quick-links" aria-label="教學連結">
      <a href="../student/" target="_blank" rel="noreferrer">學生端</a>
      <a href="../dashboard/" target="_blank" rel="noreferrer">戰情室</a>
    </nav>
  </header>

  <main class="layout">
    <section class="lesson-bar" aria-label="選擇節次">
      <div class="section-title">
        <h2>選擇節次</h2>
        <p>點選後切換教學內容。</p>
      </div>
      <div class="lesson-tabs" id="lessonTabs"></div>
      <div class="teacher-note">
        <strong>上課節奏</strong>
        <span>正式任務 40-45 分鐘。</span>
      </div>
    </section>

    <section class="stage">
      <div class="stage-head">
        <div>
          <p class="eyebrow" id="lessonTag">第 1 節</p>
          <h2 id="lessonTitle">數列概念與前幾項</h2>
        </div>
        <button id="launchButton" type="button">投放學生任務</button>
      </div>

      <div class="grid">
        <article class="panel demo-panel">
          <h3>老師示範</h3>
          <div class="demo-workbench">
            <div class="demo-card">
              <p class="demo-label">示範題</p>
              <p class="demo-question" id="demoQuestion"></p>
              <div class="demo-steps" id="demoSteps"></div>
            </div>

            <div class="whiteboard-card">
              <div class="whiteboard-head">
                <div>
                  <p class="demo-label">教師白板</p>
                  <span>可用觸控筆、滑鼠或手指書寫。</span>
                </div>
                <button class="clear-board" id="clearBoardButton" type="button">清空</button>
              </div>
              <div class="whiteboard-tools" aria-label="白板工具">
                <button class="tool active" type="button" data-tool="pen" data-color="#111827">黑</button>
                <button class="tool" type="button" data-tool="pen" data-color="#d92d20">紅</button>
                <button class="tool" type="button" data-tool="pen" data-color="#1d4ed8">藍</button>
                <button class="tool" type="button" data-tool="pen" data-color="#d6a000">黃</button>
                <button class="tool" type="button" data-tool="eraser">橡皮擦</button>
                <label>
                  粗細
                  <input id="brushSize" type="range" min="1" max="14" value="3">
                </label>
                <label>
                  橡皮擦
                  <input id="eraserSize" type="range" min="10" max="60" value="28">
                </label>
              </div>
              <div class="whiteboard-surface">
                <canvas id="whiteboard" aria-label="教師白板書寫區"></canvas>
              </div>
            </div>
          </div>
        </article>

        <article class="panel goals-panel">
          <h3>本節目標</h3>
          <ul id="goals"></ul>
        </article>

        <article class="panel flow-panel collapsed" id="flowPanel">
          <div class="panel-header">
            <div>
              <h3>40 分鐘流程</h3>
              <p id="flowSummary">點開查看本節教師流程。</p>
            </div>
            <button class="toggle-button" id="flowToggle" type="button" aria-expanded="false" aria-controls="timeline">展開</button>
          </div>
          <div class="timeline" id="timeline"></div>
        </article>

        <article class="panel observe-panel">
          <h3>巡視觀察</h3>
          <ul id="observe"></ul>
        </article>

        <article class="panel student-panel">
          <h3>學生練習</h3>
          <p id="studentTask"></p>
          <div class="link-card">
            <span id="studentUrl"></span>
            <button id="copyButton" type="button">複製連結</button>
          </div>
          <div class="qr-card">
            <img id="qrImage" alt="學生端 QR Code">
            <span>可投影給學生掃描。</span>
          </div>
        </article>

        <article class="panel close-panel">
          <h3>收尾檢查</h3>
          <ul id="checklist"></ul>
        </article>
      </div>
    </section>
  </main>

  <script src="./teach.js"></script>
</body>
</html>
